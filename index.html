<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>맥도날드 매장 찾기</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script
type="text/javascript"
src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=xmjr9jl2lj&submodules=geocoder">
</script>

</head>
<body>

<div class="container">

    <aside class="sidebar">

        <div class="brand">
            <h1>McDonald's</h1>
            <p>매장 찾기</p>
        </div>

        <div class="search-box">
            <input
                type="text"
                id="address"
                placeholder="주소를 입력하세요">
            <button id="searchBtn">검색</button>
        </div>

        <div class="map-type">
            <button id="normalBtn" class="active">일반지도</button>
            <button id="satelliteBtn">위성지도</button>
        </div>

        <ul id="storeList"></ul>

    </aside>

    <main class="map-wrap">
        <div id="map"></div>
    </main>

</div>

<script src="script.js"></script>

</body>
</html>
